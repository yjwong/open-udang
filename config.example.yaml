# OpenShrimp configuration
# Copy to ~/.config/openshrimp/config.yaml and fill in your values

telegram:
  token: "YOUR_BOT_TOKEN"

allowed_users:
  - 123456789  # Your Telegram user ID

contexts:
  default:
    directory: /home/you/Documents/your-project
    description: "Default context"
    # model: openai/gpt-5.5  # Optional override. Use provider/model.
    # effort: medium  # Optional thinking effort level: low, medium, high, xhigh, max. Omit for CLI default.
    allowed_tools:
      - LSP
      # Note: Read, Glob, Grep, Write, and Edit are intentionally NOT listed
      # here. They are handled by OpenShrimp's path-scoped approval:
      #
      # - Read, Glob, Grep: auto-approved when within the context directory.
      # - Edit, Write: always require manual approval via Telegram, even
      #   within the context directory. The approval prompt offers an
      #   "Accept all edits" button to auto-approve future Edit/Write calls
      #   for the rest of the session (cleared on /clear or context switch).
      #
      # Paths outside the context directory always require manual approval.
      # This prevents the agent from silently accessing arbitrary files
      # (e.g. ~/.ssh/*, config secrets).
      #
      # If you add them to allowed_tools, they bypass the path check entirely
      # and the agent can access any file the process can read.
      #
      # Patterns are supported — these are passed to the Claude CLI as --allowedTools
      # - "Bash(git *)"        # allow all git commands
    # additional_directories:
    #   - /home/you/Documents/shared-lib  # Extra dirs the agent can access
    #   - /home/you/Documents/api-service
    #   # These are passed to the SDK as add_dirs (equivalent to --add-dir).
    #   # Path-scoped auto-approval (Read, Glob, Grep) extends to these dirs.
    #   # The project's .claude/settings.json additionalDirectories are also
    #   # respected via setting_sources=["project"] (inherited by default).
    # default_for_chats:
    #   - -1001234567890  # Sets initial context for this group chat
    # locked_for_chats:
    #   - -1001234567890  # Locks this group chat to this context (cannot switch)
    # sandbox:                     # Run the Claude CLI in an isolated sandbox.
    #   backend: docker            # "docker" (Linux), "libvirt" (Linux VM), or "lima" (macOS VM)
    #                              # Provides strong filesystem isolation — the agent
    #                              # can only access the project directory and its
    #                              # own session storage.
    #   docker_in_docker: true     # Enable rootless Docker inside the container.
    #                              # The agent can run docker build/run/compose etc.
    #                              # Adds --cap-add SYS_ADMIN (reduced isolation).
    #   dockerfile: /path/to/Dockerfile.opencode  # Custom Dockerfile for this context.
    #                              # Use to install dev tools (Go, Node, Rust, etc.).
    #                              # Should typically FROM openshrimp-opencode:latest.
    #                              # Build context is the Dockerfile's parent dir.
    #                              # The OpenCode binary is copied in as "opencode"
    #                              # (available via OPENCODE_BIN build arg).
    #   allow_host_escape: false   # Sudo mode. Exposes a `host_bash` MCP tool that
    #                              # runs shell commands on the HOST (outside the
    #                              # sandbox). Every invocation prompts the user for
    #                              # approval via Telegram and auto-denies after 10
    #                              # seconds. All invocations are logged to
    #                              # `sudo.log` in the OpenShrimp data directory
    #                              # (platform-specific; per-instance when
    #                              # instance_name is set).
    #                              # Use sparingly — defeats the sandbox boundary.
    #   computer_use: true         # Enable GUI interaction (computer use).
    #                              # Runs a desktop environment inside the sandbox.
    #                              # Claude can take screenshots, click, type, scroll,
    #                              # and switch windows via MCP tools. A VNC server
    #                              # is exposed for observability (check /status).
    #   # Lima backend (macOS only) — full VM isolation via Apple Virtualization.framework:
    #   # backend: lima
    #   # memory: 4096              # VM memory in MB (default: 2048)
    #   # cpus: 4                   # VM CPU cores (default: 2)
    #   # disk_size: 20             # VM disk in GB (default: 20)
    #   # provision: |              # Shell script run on first boot
    #   #   apt-get install -y nodejs npm

default_context: default

# Prompt suggestions (optional). When enabled, OpenShrimp may append a single
# inline button to the last assistant message predicting the user's next prompt.
# Set OPENSHRIMP_ENABLE_PROMPT_SUGGESTION=0/1 to override at runtime.
# prompt_suggestions:
#   enabled: true

# Instance name (required when running multiple OpenShrimp instances on the
# same host).  Isolates the database, sandbox state, Docker images, Lima VMs,
# and build logs so instances don't collide.  When omitted (single-instance),
# all paths use the legacy layout.
# instance_name: mybot

# Review Mini App settings (optional)
# review:
#   host: "127.0.0.1"   # HTTP server bind address
#   port: 8080           # HTTP server port
#   public_url: "https://your-domain.com"  # Public URL for Mini App (behind reverse proxy)
#   tunnel: cloudflared  # Auto-start a cloudflared quick tunnel (free, no account needed)
#                        # Downloads cloudflared automatically if not installed.
#                        # Sets public_url from the assigned trycloudflare.com URL.
#                        # Ignored if public_url is already set.
